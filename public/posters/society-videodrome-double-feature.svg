<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 555 740" role="img" aria-labelledby="title desc">
  <title id="title">Society and Videodrome Double Feature Poster</title>
  <desc id="desc">A custom Sunday Afternoon Bonkhouse poster for a Society and Videodrome body-horror double feature.</desc>
  <defs>
    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 0H8V2H0z" fill="#ffffff" opacity=".08"/>
    </pattern>
    <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffe100" opacity=".18"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#ffea00" stop-opacity=".52"/>
      <stop offset="44%" stop-color="#d20f37" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101010"/>
      <stop offset="45%" stop-color="#202020"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>
  </defs>

  <rect width="555" height="740" fill="#030303"/>
  <rect x="18" y="18" width="519" height="704" fill="url(#glow)" opacity=".92"/>
  <rect x="18" y="18" width="519" height="704" fill="url(#scanlines)"/>
  <rect x="18" y="18" width="519" height="704" fill="url(#dots)"/>

  <path d="M47 92c77-22 134-13 171 27 27-58 79-77 156-57 52 14 93 43 124 86-30-6-60-7-91-2 36 30 62 68 79 114-48-23-93-31-135-23 19 16 31 38 36 66-47-22-90-26-131-14-45 14-88 6-128-23-32-23-67-34-105-32 18-37 46-64 84-81-26-9-46-30-60-61z" fill="#d20f37" opacity=".76"/>

  <g transform="translate(88 204)">
    <rect x="0" y="0" width="378" height="252" rx="16" fill="url(#screen)" stroke="#f7f7f7" stroke-width="7"/>
    <rect x="22" y="20" width="334" height="198" rx="8" fill="#0a0a0a" stroke="#ffe100" stroke-width="3"/>
    <path d="M55 68c48-32 92-22 131 30 35 47 77 49 127 7" fill="none" stroke="#34d0c8" stroke-width="10" opacity=".75"/>
    <path d="M52 124c62-54 117-52 166 8 35 43 75 43 120 0" fill="none" stroke="#ff2b5f" stroke-width="12" opacity=".82"/>
    <path d="M67 174c36-20 68-15 96 15 31 34 69 37 113 9" fill="none" stroke="#ffe100" stroke-width="8" opacity=".8"/>
    <path d="M120 246h139l25 44H95z" fill="#1b1b1b" stroke="#f7f7f7" stroke-width="5"/>
  </g>

  <path d="M74 501c34-25 72-27 114-8 22 10 49 13 81 10 40-4 78 10 116 42 33 27 69 42 108 44-30 31-70 45-119 43-36-2-66-12-90-31-23-18-55-21-97-10-53 14-98 1-136-39 35 3 63-5 84-24-23 2-43-7-61-27z" fill="#ffea00" opacity=".82"/>

  <text x="277" y="62" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="22" letter-spacing="2">SUNDAY AFTERNOON</text>
  <text x="277" y="93" text-anchor="middle" fill="#ffe100" font-family="Arial Black, Impact, sans-serif" font-size="34" letter-spacing="1">BONK HOUSE</text>
  <text x="277" y="140" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="28">BRYAN YUZNA'S</text>
  <text x="277" y="188" text-anchor="middle" fill="#ffe100" stroke="#090909" stroke-width="4" paint-order="stroke" font-family="Arial Black, Impact, sans-serif" font-size="73" letter-spacing="-3">SOCIETY</text>
  <text x="277" y="495" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="30" letter-spacing="3">WITH</text>
  <text x="277" y="558" text-anchor="middle" fill="#34d0c8" stroke="#090909" stroke-width="4" paint-order="stroke" font-family="Arial Black, Impact, sans-serif" font-size="68" letter-spacing="-3">VIDEODROME</text>
  <text x="277" y="609" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="27" letter-spacing="2">BODY HORROR DOUBLE FEATURE</text>

  <g transform="translate(54 638)">
    <rect x="0" y="0" width="447" height="58" fill="#090909" stroke="#ffe100" stroke-width="4"/>
    <text x="24" y="38" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="28">SUNDAY</text>
    <text x="180" y="38" fill="#ffe100" font-family="Arial Black, Impact, sans-serif" font-size="34">1 PM</text>
    <text x="290" y="37" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="22">CULVER CITY</text>
  </g>

  <path d="M24 25h507v690H24z" fill="none" stroke="#ffffff" stroke-width="5"/>
  <path d="M39 40h477v660H39z" fill="none" stroke="#ffe100" stroke-width="2" stroke-dasharray="12 10"/>
  <path d="M85 122c16-10 31-10 45 0M420 124c22-11 41-9 57 8M84 614c24 13 51 14 80 4M404 622c26-11 52-11 78 0" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".7"/>
</svg>
